name: Record Feedback

# Cloudflare Worker (cloudflare-worker/) が発火する repository_dispatch を受けて
# curation.db にフィードバックを記録する。
on:
  repository_dispatch:
    types: [feedback]

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # feedback サブコマンドは標準ライブラリのみで動くため pip install 不要
      - name: Record feedback
        env:
          ARTICLE_ID: ${{ github.event.client_payload.article_id }}
          RATING: ${{ github.event.client_payload.rating }}
        run: python main.py feedback "$ARTICLE_ID" "$RATING"

      - name: Commit feedback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add curation.db
          git diff --staged --quiet || git commit -m "chore: record feedback via web [skip ci]"
          git push
