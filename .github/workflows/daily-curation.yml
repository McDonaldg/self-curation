name: Daily Curation

on:
  workflow_dispatch: {}
  schedule:
    # 平日6:00 JST(UTC+9) = 前日21:00 UTC 日〜木
    - cron: "0 21 * * 0-4"

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run curation pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Copy digest to index.html
        run: cp output/daily.html output/index.html

      - name: Commit updated article history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add curation.db
          git diff --staged --quiet || git commit -m "chore: update curation history [skip ci]"
          git push

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
